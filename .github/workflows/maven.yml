name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -f Bai03/pom.xml clean package
      - name: Upload Artifact
        # Bước này lưu file .jar lại để bạn có thể tải về từ GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Bai03-Artifact-Jar
          path: Bai03/target/*.jar