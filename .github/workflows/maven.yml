name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -f Bai03/pom.xml clean package
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-system-jar
          path: Bai03/target/*.jar
                  - name: Upload Build Artifact
            # Bước này giúp lưu lại file .jar để tải về sau khi chạy xong
                  uses: actions/upload-artifact@v4
                  with:
                    name: Bai03-Artifact-Jar
                    # Đường dẫn trỏ đến file jar vừa build xong trong folder Bai03
                    path: Bai03/target/*.jar