name: Matrix Test Across OS

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      matrix:
        # Đây là Matrix: Robot sẽ chạy trên cả 3 hệ điều hành
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Test Bai 04
        run: mvn -f Bai04/pom.xml test